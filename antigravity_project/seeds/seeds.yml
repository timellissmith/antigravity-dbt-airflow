version: 2

seeds:
  - name: raw_telemetry
    config:
      column_types:
        id: integer
        vessel_id: string
        raw_force_reading: NUMERIC
        location_id: string
        event_time: timestamp
  - name: raw_vessels
    config:
      column_types:
        vessel_id: string
        vessel_name: string
        vessel_type: string
        commissioned_at: timestamp
  - name: raw_locations
    config:
      column_types:
        location_id: string
        location_name: string
        region: string
        facility_type: string
  - name: raw_researchers
    config:
      column_types:
        researcher_id: integer
        first_name: string
        last_name: string
        email: string
        specialization: string
        assigned_vessel_id: string
        joined_at: timestamp
