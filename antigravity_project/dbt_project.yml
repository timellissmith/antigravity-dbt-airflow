name: 'antigravity_project'
version: '1.0.0'
config-version: 2

profile: 'antigravity'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  antigravity_project:
    bronze:
      +tags: ["deploy"]
    silver:
      +tags: ["deploy"]
    gold:
      +tags: ["deploy"]

tests:
  antigravity_project:
    +tags: ["prod_test"]

# Streaming models: thin views over infrastructure-managed tables.
# Excluded from standard batch runs; included only when streaming infra is available.
# Run with: dbtf run --select tag:streaming
# Exclude with: dbtf run --exclude tag:streaming

