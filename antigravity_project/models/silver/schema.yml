version: 2

models:
  - name: stg_telemetry
    description: "Standardized telemetry data from antigravity vessels."
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: vessel_id
      - name: location_id
      - name: gravity_g
        description: "Gravity reading in Gs (1.0 is standard Earth gravity)."
      - name: observed_at

  - name: stg_researchers
    description: "Standardized researcher information."
    columns:
      - name: researcher_id
        tests:
          - unique
          - not_null
      - name: first_name
      - name: last_name
      - name: email
      - name: specialization
      - name: assigned_vessel_id
      - name: joined_at

  - name: stg_vessels
    description: "Standardized vessel metadata."
    columns:
      - name: vessel_id
        tests:
          - unique
          - not_null

  - name: stg_locations
    description: "Standardized research location data."
    columns:
      - name: location_id
        tests:
          - unique
          - not_null

  - name: stg_telemetry_stream
    description: >
      Real-time telemetry events processed by the BigQuery Continuous Query.
      Populated continuously from streaming.raw_telemetry_stream (Pub/Sub → BQ).
      This view is infrastructure-managed; dbt provides docs and tests only.
    config:
      tags: ["streaming"]
    columns:
      - name: event_id
        description: "Normalised event ID from the bronze table."
        tests:
          - not_null
      - name: vessel_id
        description: "Vessel identifier — references dim_vessels."
        tests:
          - not_null
      - name: location_id
        description: "Location identifier — references dim_locations."
        tests:
          - not_null
      - name: gravity_g
        description: "Force reading converted to Standard Gravity (G)."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -2
              max_value: 10
      - name: observed_at
        description: "Parsed event timestamp from the generator."
        tests:
          - not_null
      - name: processed_at
        description: "Timestamp when the Continuous Query processed this row."
        tests:
          - not_null

unit_tests:

  - name: test_gravity_standardization
    model: stg_telemetry
    given:
      - input: source('raw_layer', 'raw_telemetry')
        rows:
          - {raw_force_reading: 9.80665, id: 1, vessel_id: 'V001', location_id: 'L001', event_time: '2026-03-18 20:00:00'}
    expect:
      rows:
        - {gravity_g: 1.0, event_id: 1}
