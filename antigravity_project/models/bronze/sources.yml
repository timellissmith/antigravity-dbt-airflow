version: 2

sources:
  - name: raw_layer
    # database: "{{ env_var('GCP_PROJECT_ID', 'your-project-id') }}"
    database: "{{ env_var('GCP_PROJECT_ID', '') }}"
    schema: "{{ env_var('GCP_SCHEMA', 'antigravity_prod') }}"
    tables:
      - name: raw_telemetry
        columns:
          - name: id
            data_type: int64
          - name: vessel_id
            data_type: string
          - name: raw_force_reading
            data_type: float64
          - name: location_id
            data_type: string
          - name: event_time
            data_type: timestamp
      - name: raw_researchers
        columns:
          - name: researcher_id
            data_type: int64
          - name: first_name
            data_type: string
          - name: last_name
            data_type: string
          - name: email
            data_type: string
          - name: specialization
            data_type: string
          - name: assigned_vessel_id
            data_type: string
          - name: joined_at
            data_type: timestamp
      - name: raw_vessels
        columns:
          - name: vessel_id
            data_type: string
          - name: vessel_name
            data_type: string
          - name: vessel_type
            data_type: string
          - name: commissioned_at
            data_type: timestamp
      - name: raw_locations
        columns:
          - name: location_id
            data_type: string
          - name: location_name
            data_type: string
          - name: region
            data_type: string
          - name: facility_type
            data_type: string

  - name: streaming_layer
    description: "Real-time streaming tables populated by Pub/Sub → BigQuery subscription and Continuous Query."
    database: "{{ env_var('GCP_PROJECT_ID', '') }}"
    schema: "streaming"
    tables:
      - name: raw_telemetry_stream
        description: "Bronze landing table. Populated by Pub/Sub BigQuery native subscription."
        columns:
          - name: id
            description: "Unique event ID published by the generator."
            data_type: int64
          - name: vessel_id
            description: "Vessel identifier (FK → dim_vessels)."
            data_type: string
          - name: raw_force_reading
            description: "Unscaled force reading (m/s²)."
            data_type: float64
          - name: location_id
            description: "Location identifier (FK → dim_locations)."
            data_type: string
          - name: event_time
            description: "ISO 8601 UTC timestamp string from the generator."
            data_type: string

      - name: stg_telemetry_stream
        description: "Silver streaming table. Populated by BigQuery Continuous Query from raw_telemetry_stream."
        columns:
          - name: event_id
            description: "Normalised event ID."
            data_type: int64
          - name: vessel_id
            description: "Vessel identifier."
            data_type: string
          - name: location_id
            description: "Location identifier."
            data_type: string
          - name: gravity_g
            description: "Force reading in Standard Gravity (G)."
            data_type: float64
          - name: observed_at
            description: "Parsed event timestamp."
            data_type: timestamp
          - name: processed_at
            description: "CQ processing timestamp."
            data_type: timestamp

