version: 2

sources:
  - name: raw_layer
    # database: "{{ env_var('GCP_PROJECT_ID', 'your-project-id') }}"
    database: "{{ env_var('GCP_PROJECT_ID', 'modelling-demo') }}"
    schema: "{{ env_var('GCP_SCHEMA', 'antigravity_prod') }}"
    tables:
      - name: raw_telemetry
        columns:
          - name: id
            data_type: int64
          - name: vessel_id
            data_type: string
          - name: raw_force_reading
            data_type: float64
          - name: location_id
            data_type: string
          - name: event_time
            data_type: timestamp
      - name: raw_researchers
        columns:
          - name: researcher_id
            data_type: int64
          - name: first_name
            data_type: string
          - name: last_name
            data_type: string
          - name: email
            data_type: string
          - name: specialization
            data_type: string
          - name: assigned_vessel_id
            data_type: string
          - name: joined_at
            data_type: timestamp
      - name: raw_vessels
        columns:
          - name: vessel_id
            data_type: string
          - name: vessel_name
            data_type: string
          - name: vessel_type
            data_type: string
          - name: commissioned_at
            data_type: timestamp
      - name: raw_locations
        columns:
          - name: location_id
            data_type: string
          - name: location_name
            data_type: string
          - name: region
            data_type: string
          - name: facility_type
            data_type: string
