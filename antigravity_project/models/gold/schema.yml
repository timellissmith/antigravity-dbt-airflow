version: 2

models:
  - name: dim_researchers
    description: "Curated dimension table for antigravity researchers."
    columns:
      - name: researcher_id
        tests:
          - unique
          - not_null:
              config:
                tags: ['prod_test']
      - name: full_name
      - name: email
      - name: specialization
      - name: assigned_vessel_id
      - name: tenure_days

  - name: fct_levitation_events
    description: "Fact table for levitation events, enriched with researcher, vessel, and location details."
    columns:
      - name: event_id
        tests:
          - unique
          - not_null:
              config:
                tags: ['prod_test']
      - name: vessel_id
      - name: vessel_name
      - name: location_id
      - name: location_name
      - name: researcher_id
        tests:
          - not_null:
              config:
                tags: ['prod_test']
      - name: lead_researcher
      - name: gravity_g
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: -1
                max_value: 2
              config:
                tags: ['prod_test']
      - name: observed_at
      - name: is_levitation_event

  - name: dim_vessels
    description: "Dimension table for antigravity vessels."
    columns:
      - name: vessel_id
        tests:
          - unique
          - not_null
      - name: vessel_name
      - name: vessel_type
      - name: commissioned_at
      - name: age_days

  - name: dim_locations
    description: "Dimension table for research locations."
    columns:
      - name: location_id
        tests:
          - unique
          - not_null
      - name: location_name
      - name: region
      - name: facility_type
