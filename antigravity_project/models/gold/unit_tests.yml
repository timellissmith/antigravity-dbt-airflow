version: 2

unit_tests:
  - name: test_fct_levitation_events_enrichment
    description: "Verify that fct_levitation_events correctly joins vessels, locations, and researchers."
    model: fct_levitation_events
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('stg_telemetry')
        rows:
          - {event_id: 101, vessel_id: 'V_TEST', location_id: 'L_TEST', gravity_g: 0.05, observed_at: '2026-03-20 12:00:00'}
      - input: ref('dim_vessels')
        rows:
          - {vessel_id: 'V_TEST', vessel_name: 'Test Vessel', vessel_type: 'Probe', age_days: 100}
      - input: ref('dim_locations')
        rows:
          - {location_id: 'L_TEST', location_name: 'Test Lab', region: 'Test Region'}
      - input: ref('dim_researchers')
        rows:
          - {researcher_id: 99, full_name: 'Test Scientist', assigned_vessel_id: 'V_TEST', tenure_days: 50}
    expect:
      rows:
        - {event_id: 101, vessel_name: 'Test Vessel', location_name: 'Test Lab', lead_researcher: 'Test Scientist', is_levitation_event: true}

  - name: test_dim_researchers_full_name
    description: "Verify full name concatenation in dim_researchers."
    model: dim_researchers
    given:
      - input: ref('stg_researchers')
        rows:
          - {researcher_id: 1, first_name: 'John', last_name: 'Doe', email: 'john@test.com', specialization: 'Levitation', assigned_vessel_id: 'V1', joined_at: '2025-01-01 00:00:00'}
    expect:
      rows:
        - {researcher_id: 1, full_name: 'John Doe'}
